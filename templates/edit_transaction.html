<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Transaction - Budget App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>Edit Transaction</h1>
    </header>
    <section class="left">
      <form method="post" action="{{ url_for('edit_transaction', tx_id=transaction.id) }}">
        <label>Date <input type="date" name="date" value="{{ transaction.date }}"></label>
        <label>Description <input type="text" name="description" value="{{ transaction.description }}"></label>
        <label>Category
          <select name="category_id">
            <option value="">Uncategorized</option>
            {% for c in categories %}
            <option value="{{ c.id }}" {% if c.id == transaction.category_id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </label>
        <label>Type
          <select name="type">
            <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
            <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
          </select>
        </label>
        <label>Amount <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required></label>
        <div>
          <button type="submit">Update</button>
          <a href="{{ url_for('index', month=transaction.date[:7]) }}">Cancel</a>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
